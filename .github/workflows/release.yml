name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: win32-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_NAME="vibedeckx-${VERSION}-${{ matrix.platform }}"
          mkdir -p "staging/${ARCHIVE_NAME}"

          # Copy dist (backend + bundled UI)
          cp -r packages/vibedeckx/dist "staging/${ARCHIVE_NAME}/"

          # Copy package.json for dependency info
          cp packages/vibedeckx/package.json "staging/${ARCHIVE_NAME}/"

          # Install production dependencies into staging
          cd "staging/${ARCHIVE_NAME}"
          npm install --omit=dev --ignore-scripts --legacy-peer-deps
          npm rebuild better-sqlite3 node-pty
          cd ../..

          # Create tarball
          tar -czf "${ARCHIVE_NAME}.tar.gz" -C staging "${ARCHIVE_NAME}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          $archiveName = "vibedeckx-${version}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path "staging/${archiveName}"

          # Copy dist (backend + bundled UI)
          Copy-Item -Recurse packages/vibedeckx/dist "staging/${archiveName}/"

          # Copy package.json for dependency info
          Copy-Item packages/vibedeckx/package.json "staging/${archiveName}/"

          # Install production dependencies into staging
          Set-Location "staging/${archiveName}"
          npm install --omit=dev --ignore-scripts --legacy-peer-deps
          npm rebuild better-sqlite3 node-pty
          Set-Location ../..

          # Create zip
          Compress-Archive -Path "staging/${archiveName}" -DestinationPath "${archiveName}.zip"

      # Prepare platform npm package from the staged build
      - name: Prepare platform npm package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_NAME="vibedeckx-${VERSION}-${{ matrix.platform }}"
          mkdir -p npm-package

          # Copy the complete built package (dist + node_modules)
          cp -r "staging/${ARCHIVE_NAME}/dist" npm-package/
          cp -r "staging/${ARCHIVE_NAME}/node_modules" npm-package/

          # Copy the platform-specific package.json template and set version
          cp "packages/vibedeckx-${{ matrix.platform }}/package.json" npm-package/
          cd npm-package
          npm version "$VERSION" --no-git-tag-version
          cd ..

      - name: Prepare platform npm package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          $archiveName = "vibedeckx-${version}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path npm-package

          # Copy the complete built package (dist + node_modules)
          Copy-Item -Recurse "staging/${archiveName}/dist" npm-package/
          Copy-Item -Recurse "staging/${archiveName}/node_modules" npm-package/

          # Copy the platform-specific package.json template and set version
          Copy-Item "packages/vibedeckx-${{ matrix.platform }}/package.json" npm-package/
          Set-Location npm-package
          npm version "$version" --no-git-tag-version
          Set-Location ..

      - name: Upload release artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vibedeckx-${{ matrix.platform }}
          path: "*.tar.gz"

      - name: Upload release artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vibedeckx-${{ matrix.platform }}
          path: "*.zip"

      - name: Upload npm platform package
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platform }}
          path: npm-package/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vibedeckx-*
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > release-notes.md << NOTES_EOF
          ## Installation

          ### Quick install via npx

          \`\`\`bash
          npx vibedeckx@latest
          \`\`\`

          ### macOS

          1. Download \`vibedeckx-${VERSION}-darwin-arm64.tar.gz\`
          2. Install globally via npm:
          \`\`\`bash
          npm install -g ./vibedeckx-${VERSION}-darwin-arm64.tar.gz
          \`\`\`
          3. Run:
          \`\`\`bash
          vibedeckx
          \`\`\`

          ### Linux

          1. Download \`vibedeckx-${VERSION}-linux-x64.tar.gz\`
          2. Run directly with npx:
          \`\`\`bash
          npx -y ./vibedeckx-${VERSION}-linux-x64.tar.gz
          \`\`\`

          ### Windows

          1. Download \`vibedeckx-${VERSION}-win32-x64.zip\`
          2. Run directly with npx:
          \`\`\`bash
          npx -y ./vibedeckx-${VERSION}-win32-x64.zip
          \`\`\`

          ### Platform archives
          | Platform | File |
          |----------|------|
          NOTES_EOF

          for f in artifacts/*; do
            fname=$(basename "$f")
            echo "| $(echo $fname | sed 's/vibedeckx-[0-9.]*-//' | sed 's/\.tar\.gz//' | sed 's/\.zip//') | \`${fname}\` |" >> release-notes.md
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: artifacts/*
          generate_release_notes: true
          append_body: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download platform npm packages
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: npm-packages

      # Publish each platform package
      - name: Publish @vibedeckx/linux-x64
        run: npm publish --access public
        working-directory: npm-packages/npm-linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vibedeckx/darwin-arm64
        run: npm publish --access public
        working-directory: npm-packages/npm-darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vibedeckx/win32-x64
        run: npm publish --access public
        working-directory: npm-packages/npm-win32-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish the main thin wrapper package
      - name: Prepare main package for npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd packages/vibedeckx

          # Rewrite package.json as thin wrapper (no dependencies, just platform optionalDeps)
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            const wrapper = {
              name: pkg.name,
              version: '${VERSION}',
              type: 'module',
              description: 'AI-powered app generator with project management',
              bin: { vibedeckx: './bin/vibedeckx.mjs' },
              files: ['./bin/*'],
              engines: { node: '>=20' },
              optionalDependencies: {
                '@vibedeckx/linux-x64': '${VERSION}',
                '@vibedeckx/darwin-arm64': '${VERSION}',
                '@vibedeckx/win32-x64': '${VERSION}'
              }
            };
            require('fs').writeFileSync('package.json', JSON.stringify(wrapper, null, 2) + '\n');
          "

      - name: Publish vibedeckx
        run: npm publish --access public
        working-directory: packages/vibedeckx
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
